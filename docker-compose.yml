# ==========================================
# DEVELOPMENT Docker Compose - Chess Ultimate App
# ==========================================
# SECURITY NOTICE:
# - Database ports NOT exposed externally
# - Resource limits enforced on all containers
# ==========================================
# NOTE: Redis and Weaviate disabled - not currently used
# ==========================================

services:
  # ==========================================
  # Chess Ultimate App - Backend (Flask)
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chess-ultimate-backend
    ports:
      - "5002:5001"
    env_file:
      - ./backend/.env
    environment:
      - FLASK_ENV=development
      - HOST=0.0.0.0
      - PORT=5001
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - chess-ultimate-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ==========================================
  # Chess Ultimate App - Frontend (Next.js)
  # ==========================================
  # SECURITY: All secrets loaded from .env.production file
  # DO NOT add inline secrets here!
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # These are loaded from .env.production at build time
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL}
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: chess-ultimate-frontend
    ports:
      - "3003:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - chess-ultimate-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

