[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: pure logic, no I/O
    integration: hits local resources (SQLite, Stockfish)
    e2e: full API round-trip (requires running Hermes daemon)
    slow: takes >5s
addopts = -v --tb=short
